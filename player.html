<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Player — LuZiD LaYeRs</title>
<link rel="stylesheet" href="fonts.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'C1st Font',serif;color:#fff}

canvas#universe{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── INTRO ── */
#intro{position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity 1.8s ease}
#intro.out{opacity:0;pointer-events:none}

.intro-brand{font-family:'C1st Font',serif;font-size:clamp(28px,5vw,54px);
  letter-spacing:.18em;color:#fff;margin-bottom:6px;
  text-shadow:0 0 30px rgba(0,229,255,.5),0 0 80px rgba(0,229,255,.15);
  animation:breathe 4s ease-in-out infinite}
@keyframes breathe{
  0%,100%{text-shadow:0 0 30px rgba(0,229,255,.4),0 0 80px rgba(0,229,255,.1)}
  50%    {text-shadow:0 0 60px rgba(0,229,255,.9),0 0 120px rgba(139,92,246,.3)}}
.intro-sub{font-size:10px;letter-spacing:.5em;text-transform:uppercase;
  color:rgba(255,255,255,.2);margin-bottom:72px}

.mode-label{font-size:9px;letter-spacing:.5em;text-transform:uppercase;
  color:rgba(255,255,255,.2);margin-bottom:28px}

.mode-btns{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}

.mode-btn{display:flex;flex-direction:column;align-items:center;gap:14px;
  width:160px;padding:32px 24px;border-radius:24px;
  border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);
  transition:all .3s;position:relative;overflow:hidden}
.mode-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s}
.mode-btn:hover{transform:translateY(-4px)}

.mode-btn.mic::before{background:radial-gradient(ellipse at 50% 120%,rgba(0,229,255,.12),transparent)}
.mode-btn.mic:hover{border-color:rgba(0,229,255,.3);box-shadow:0 20px 60px -20px rgba(0,229,255,.2)}
.mode-btn.mic:hover::before{opacity:1}

.mode-btn.sys::before{background:radial-gradient(ellipse at 50% 120%,rgba(139,92,246,.12),transparent)}
.mode-btn.sys:hover{border-color:rgba(139,92,246,.3);box-shadow:0 20px 60px -20px rgba(139,92,246,.2)}
.mode-btn.sys:hover::before{opacity:1}

.mode-icon{font-size:32px;line-height:1}
.mode-name{font-family:'C1st Font',serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.7)}
.mode-desc{font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.25);text-align:center;line-height:1.5}

/* error hint */
#err-hint{font-size:10px;letter-spacing:.2em;color:rgba(255,80,80,.6);
  margin-top:28px;text-align:center;min-height:16px}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 36px;opacity:0;transition:opacity 1s ease;pointer-events:none}
#nav.show{opacity:1;pointer-events:all}
.nav-back{font-family:'C1st Font',serif;font-size:9px;letter-spacing:.35em;
  text-transform:uppercase;color:rgba(0,229,255,.5);text-decoration:none;transition:color .2s}
.nav-back:hover{color:rgba(0,229,255,1)}

/* ── STATUS BAR ── */
#status-bar{position:fixed;bottom:36px;left:0;right:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;transition:opacity 1s ease;pointer-events:none}
#status-bar.show{opacity:1;pointer-events:all}

.status-pill{display:flex;align-items:center;gap:10px;
  padding:8px 20px;border-radius:40px;
  border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.4);
  backdrop-filter:blur(12px)}
.status-dot{width:6px;height:6px;border-radius:50%;background:rgba(0,229,255,.8);
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,.4)}50%{box-shadow:0 0 0 5px rgba(0,229,255,0)}}
.status-text{font-family:'C1st Font',serif;font-size:9px;letter-spacing:.35em;
  text-transform:uppercase;color:rgba(255,255,255,.4)}

.stop-btn{font-family:'C1st Font',serif;font-size:8px;letter-spacing:.3em;
  text-transform:uppercase;color:rgba(255,255,255,.2);border:none;background:transparent;
  padding:4px 10px;transition:color .2s}
.stop-btn:hover{color:rgba(255,100,100,.7)}

/* vis bars */
.vis-bars{display:flex;gap:2px;align-items:flex-end;height:24px}
.f-bar{width:3px;min-height:2px;border-radius:1px 1px 0 0;background:rgba(0,229,255,.4)}

/* ── CURSOR ── */
a,button{cursor:none}
#cursor-dot{position:fixed;z-index:9999;pointer-events:none;width:8px;height:8px;
  border-radius:50%;background:rgba(0,229,255,.9);
  box-shadow:0 0 8px rgba(0,229,255,.9),0 0 20px rgba(0,229,255,.4);
  transform:translate(-50%,-50%);transition:width .15s,height .15s}
#cursor-ring{position:fixed;z-index:9998;pointer-events:none;width:32px;height:32px;
  border-radius:50%;border:1px solid rgba(0,229,255,.35);transform:translate(-50%,-50%)}
body.ch #cursor-dot{width:12px;height:12px;
  box-shadow:0 0 16px rgba(0,229,255,1),0 0 40px rgba(0,229,255,.6)}
body.ch #cursor-ring{width:50px;height:50px;border-color:rgba(0,229,255,.6)}
</style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<canvas id="universe"></canvas>

<!-- INTRO -->
<div id="intro">
  <div class="intro-brand">LuZiD LaYeRs</div>
  <div class="intro-sub">Web Player</div>
  <div class="mode-label">Wie hörst du Musik?</div>
  <div class="mode-btns">
    <button class="mode-btn mic" onclick="startMic()">
      <div class="mode-icon">🎙</div>
      <div class="mode-name">Mikrofon</div>
      <div class="mode-desc">Musik läuft aus Lautsprechern — Mic hört zu</div>
    </button>
    <button class="mode-btn sys" onclick="startSysAudio()">
      <div class="mode-icon">🖥</div>
      <div class="mode-name">System Audio</div>
      <div class="mode-desc">Spotify, YouTube & co. direkt im Browser</div>
    </button>
  </div>
  <div id="err-hint"></div>
</div>

<!-- NAV -->
<nav id="nav">
  <a class="nav-back" href="home.html">← Universum</a>
</nav>

<!-- STATUS -->
<div id="status-bar">
  <div class="vis-bars" id="vis-bars"></div>
  <div class="status-pill">
    <div class="status-dot"></div>
    <div class="status-text" id="status-text">Hört zu</div>
  </div>
  <button class="stop-btn" onclick="stopAll()">■ Stoppen</button>
</div>

<script>
const canvas=document.getElementById('universe'),ctx=canvas.getContext('2d');
let W,H,stars=[],frame=0;
let analyser=null,freqData=null,waveData=null;
let bass=0,mid=0,treble=0,vol=0;
let activeStream=null;
let actx=null;

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;initStars();}
addEventListener('resize',resize);

// ── STARS ───────────────────────────────────────────────────────────────────
class Star{
  constructor(){this.init()}
  init(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.z=Math.random();this.baseR=.3+this.z*1.5;
    this.vx=(Math.random()-.5)*.09*(0.3+this.z*.7);
    this.vy=(Math.random()-.5)*.09*(0.3+this.z*.7);
    this.phase=Math.random()*Math.PI*2;
    this.band=Math.floor(Math.random()*16);
    this.isHot=Math.random()<.04;this.brt=0;
  }
  update(){
    const b=freqData?getBand(this.band,freqData,16):0;
    this.brt=.2+b*.8;
    const push=bass*.6,dx=this.x-W*.5,dy=this.y-H*.5,dist=Math.sqrt(dx*dx+dy*dy)||1;
    this.vx+=(dx/dist)*push*.003;this.vy+=(dy/dist)*push*.003;
    this.vx*=.995;this.vy*=.995;
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<-10)this.x=W+10;if(this.x>W+10)this.x=-10;
    if(this.y<-10)this.y=H+10;if(this.y>H+10)this.y=-10;
  }
  draw(){
    const tw=.6+.4*Math.sin(frame*.03+this.phase);
    const r=this.baseR*(1+bass*2)*tw,a=(.3+this.brt*.7)*tw;
    const col=this.z>.7?lerpColor([0,229,255],[139,92,246],(vol+bass)*.5):[255,255,255];
    ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${a})`;ctx.fill();
    if(this.isHot||(this.brt>.75&&this.z>.6)){
      const gr=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*8);
      gr.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${a*.35})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(this.x,this.y,r*8,0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
    }
  }
}
function initStars(){stars=Array.from({length:Math.min(420,Math.floor(W*H/4800))},()=>new Star());}

// ── VISUALS ─────────────────────────────────────────────────────────────────
function drawNebulae(){
  const t=frame*.0004;
  [{cx:W*.5+Math.sin(t)*W*.2,cy:H*.45+Math.cos(t*.7)*H*.13,r:Math.min(W,H)*(.4+bass*.18),ca:[0,229,255],a:.05+mid*.08},
   {cx:W*.7+Math.cos(t*.6)*W*.14,cy:H*.55+Math.sin(t*.9)*H*.1,r:Math.min(W,H)*(.3+mid*.1),ca:[139,92,246],a:.04+bass*.07},
   {cx:W*.25+Math.sin(t*.8)*W*.1,cy:H*.3+Math.cos(t*1.1)*H*.09,r:Math.min(W,H)*(.22+treble*.08),ca:[80,200,255],a:.03+vol*.05}
  ].forEach(b=>{
    const gr=ctx.createRadialGradient(b.cx,b.cy,0,b.cx,b.cy,b.r);
    gr.addColorStop(0,`rgba(${b.ca[0]},${b.ca[1]},${b.ca[2]},${b.a})`);
    gr.addColorStop(.5,`rgba(${b.ca[0]},${b.ca[1]},${b.ca[2]},${b.a*.3})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  });
}
function drawCore(){
  const r=80+bass*280+vol*120;
  const gr=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
  gr.addColorStop(0,`rgba(0,229,255,${.08+bass*.3})`);
  gr.addColorStop(.3,`rgba(0,229,255,${.03+bass*.1})`);
  gr.addColorStop(.7,`rgba(139,92,246,${.02+mid*.05})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
}
function drawConnections(){
  const maxDist=90+vol*80,near=stars.filter(s=>s.z>.5);
  for(let i=0;i<near.length;i++) for(let j=i+1;j<near.length;j++){
    const dx=near[i].x-near[j].x,dy=near[i].y-near[j].y,d2=dx*dx+dy*dy;
    if(d2<maxDist*maxDist){
      const f=1-Math.sqrt(d2)/maxDist;
      ctx.beginPath();ctx.moveTo(near[i].x,near[i].y);ctx.lineTo(near[j].x,near[j].y);
      ctx.strokeStyle=`rgba(0,229,255,${f*.15*(1+vol*2)})`;ctx.lineWidth=.4+f*.7;ctx.stroke();
    }
  }
}
function drawWaveRing(){
  if(!waveData||!analyser)return;
  analyser.getByteTimeDomainData(waveData);
  const cx=W/2,cy=H/2,baseR=Math.min(W,H)*.22;
  ctx.beginPath();
  for(let i=0;i<waveData.length;i++){
    const angle=(i/waveData.length)*Math.PI*2-Math.PI/2;
    const v=waveData[i]/128-1,r=baseR+v*baseR*.8*(1+vol*1.5);
    const x=cx+Math.cos(angle)*r,y=cy+Math.sin(angle)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.strokeStyle=`rgba(0,229,255,${.1+vol*.3})`;ctx.lineWidth=1.2;ctx.stroke();
}
function drawFreqRing(){
  if(!freqData||!analyser)return;
  analyser.getByteFrequencyData(freqData);
  const cx=W/2,cy=H/2,n=64,baseR=Math.min(W,H)*.28;
  for(let i=0;i<n;i++){
    const idx=Math.floor((i/n)*freqData.length*.6);
    const v=freqData[idx]/255;
    const angle=(i/n)*Math.PI*2-Math.PI/2;
    const r1=baseR,r2=baseR+v*Math.min(W,H)*.12;
    const col=lerpColor([0,229,255],[139,92,246],v);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(angle)*r1,cy+Math.sin(angle)*r1);
    ctx.lineTo(cx+Math.cos(angle)*r2,cy+Math.sin(angle)*r2);
    ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${.5+v*.5})`;
    ctx.lineWidth=2+v*2;ctx.stroke();
  }
}
function updateVisBars(){
  if(!freqData)return;
  document.querySelectorAll('.f-bar').forEach((bar,i)=>{
    const idx=Math.floor((i/20)*freqData.length*.6),v=freqData[idx]/255;
    bar.style.height=(2+v*22)+'px';
    const c=lerpColor([0,229,255],[139,92,246],v);
    bar.style.background=`rgba(${c[0]},${c[1]},${c[2]},${.4+v*.6})`;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  requestAnimationFrame(render);frame++;
  if(analyser&&freqData){
    analyser.getByteFrequencyData(freqData);
    const len=freqData.length,bEnd=Math.floor(len*.08),mEnd=Math.floor(len*.45);
    let bS=0,mS=0,tS=0;
    for(let i=0;i<bEnd;i++)bS+=freqData[i];
    for(let i=bEnd;i<mEnd;i++)mS+=freqData[i];
    for(let i=mEnd;i<len;i++)tS+=freqData[i];
    bass  =smooth(bass,  bS/bEnd/255,.15);
    mid   =smooth(mid,   mS/(mEnd-bEnd)/255,.15);
    treble=smooth(treble,tS/(len-mEnd)/255,.15);
    vol   =bass*.5+mid*.3+treble*.2;
    updateVisBars();
  } else {
    bass=.04+Math.sin(frame*.018)*.03;
    mid =.03+Math.cos(frame*.025)*.02;
    treble=.02;vol=.035;
  }
  ctx.fillStyle=`rgba(0,0,0,${.15+bass*.1})`;ctx.fillRect(0,0,W,H);
  drawNebulae();drawCore();drawConnections();drawFreqRing();drawWaveRing();
  for(const s of stars){s.update();s.draw();}
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getBand(band,arr,total){
  const sz=Math.floor(arr.length/total);let s=0;
  for(let i=band*sz;i<(band+1)*sz&&i<arr.length;i++)s+=arr[i];
  return s/(sz*255);
}
function smooth(o,v,f){return o+(v-o)*f}
function lerpColor(a,b,t){
  t=Math.max(0,Math.min(1,t));
  return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];
}

// ── AUDIO SETUP ───────────────────────────────────────────────────────────────
function setupAnalyser(stream){
  stopAll(false);
  activeStream=stream;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  const src=actx.createMediaStreamSource(stream);
  analyser=actx.createAnalyser();
  analyser.fftSize=2048;
  analyser.smoothingTimeConstant=.82;
  src.connect(analyser);
  freqData=new Uint8Array(analyser.frequencyBinCount);
  waveData=new Uint8Array(analyser.fftSize);
}

function showPlayer(label){
  document.getElementById('intro').classList.add('out');
  document.getElementById('status-text').textContent=label;
  setTimeout(()=>{
    document.getElementById('nav').classList.add('show');
    document.getElementById('status-bar').classList.add('show');
  },600);
}

function setErr(msg){document.getElementById('err-hint').textContent=msg;}

// ── MIC ───────────────────────────────────────────────────────────────────────
async function startMic(){
  setErr('');
  if(!navigator.mediaDevices?.getUserMedia){setErr('Mikrofon nicht unterstützt.');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    setupAnalyser(stream);
    showPlayer('Mikrofon aktiv');
  }catch(e){
    if(e.name==='NotAllowedError')setErr('Mikrofon-Zugriff verweigert. Bitte in den Browser-Einstellungen erlauben.');
    else setErr('Mikrofon nicht verfügbar.');
  }
}

// ── SYSTEM AUDIO ─────────────────────────────────────────────────────────────
async function startSysAudio(){
  setErr('');
  if(!navigator.mediaDevices?.getDisplayMedia){setErr('System Audio nicht unterstützt (Chrome empfohlen).');return;}
  try{
    // request screen share with audio — user picks a tab or "Share system audio"
    const stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
    // drop video track immediately to save resources
    stream.getVideoTracks().forEach(t=>t.stop());
    const audioTracks=stream.getAudioTracks();
    if(audioTracks.length===0){
      stream.getTracks().forEach(t=>t.stop());
      setErr('Kein Audio gefunden. Beim Teilen "Audio teilen" aktivieren.');
      return;
    }
    setupAnalyser(stream);
    showPlayer('System Audio aktiv');
    // stop when user ends the share
    audioTracks[0].addEventListener('ended',()=>{
      analyser=null;freqData=null;waveData=null;
      document.getElementById('status-text').textContent='Gestoppt';
    });
  }catch(e){
    if(e.name!=='AbortError'&&e.name!=='NotAllowedError')setErr('System Audio nicht verfügbar.');
  }
}

// ── STOP ─────────────────────────────────────────────────────────────────────
function stopAll(showIntro=true){
  if(activeStream){activeStream.getTracks().forEach(t=>t.stop());activeStream=null;}
  if(actx){actx.close();actx=null;}
  analyser=null;freqData=null;waveData=null;
  if(showIntro){
    document.getElementById('nav').classList.remove('show');
    document.getElementById('status-bar').classList.remove('show');
    document.getElementById('intro').classList.remove('out');
    setErr('');
  }
}

// ── VIS BARS INIT ─────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('vis-bars');
  for(let i=0;i<20;i++){const b=document.createElement('div');b.className='f-bar';b.style.height='2px';c.appendChild(b);}
})();

resize();render();
</script>
<script>
const _cd=document.getElementById('cursor-dot'),_cr=document.getElementById('cursor-ring');
let _mx=0,_my=0,_rx=0,_ry=0;
document.addEventListener('mousemove',e=>{_mx=e.clientX;_my=e.clientY;_cd.style.left=_mx+'px';_cd.style.top=_my+'px';});
(function _rl(){_rx+=(_mx-_rx)*.12;_ry+=(_my-_ry)*.12;_cr.style.left=_rx+'px';_cr.style.top=_ry+'px';requestAnimationFrame(_rl);})();
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});
</script>
</body>
</html>
