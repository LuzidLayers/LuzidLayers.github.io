<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Player — LuZiD LaYeRs</title>
<link rel="stylesheet" href="fonts.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'C1st Font',serif;color:#fff}

canvas#universe{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── INTRO ── */
#intro{position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.6s ease}
#intro.out{opacity:0;pointer-events:none}

.intro-brand{font-family:'C1st Font',serif;font-size:clamp(26px,5vw,52px);
  letter-spacing:.18em;color:#fff;margin-bottom:6px;
  text-shadow:0 0 30px rgba(0,229,255,.5);animation:breathe 4s ease-in-out infinite}
@keyframes breathe{
  0%,100%{text-shadow:0 0 30px rgba(0,229,255,.4),0 0 80px rgba(0,229,255,.1)}
  50%{text-shadow:0 0 60px rgba(0,229,255,.9),0 0 120px rgba(139,92,246,.3)}}
.intro-sub{font-size:10px;letter-spacing:.5em;text-transform:uppercase;
  color:rgba(255,255,255,.25);margin-bottom:64px}

.load-zone{display:flex;flex-direction:column;align-items:center;gap:16px}
.load-prompt{font-size:10px;letter-spacing:.45em;text-transform:uppercase;
  color:rgba(255,255,255,.3);margin-bottom:4px}

/* drop target */
#drop-zone{width:260px;height:130px;border:1px solid rgba(0,229,255,.2);border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(0,229,255,.02);transition:all .25s;position:relative}
#drop-zone.drag{border-color:rgba(0,229,255,.7);background:rgba(0,229,255,.07);
  box-shadow:0 0 40px rgba(0,229,255,.15)}
.drop-icon{font-size:28px;opacity:.5}
.drop-text{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.drop-sub{font-size:9px;letter-spacing:.25em;color:rgba(255,255,255,.15)}
#file-input{display:none}

.or-line{display:flex;align-items:center;gap:14px;color:rgba(255,255,255,.15);
  font-size:9px;letter-spacing:.3em;text-transform:uppercase;width:260px}
.or-line::before,.or-line::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}

.mic-intro-btn{padding:14px 36px;border:1px solid rgba(0,229,255,.2);border-radius:40px;
  background:rgba(0,229,255,.03);color:rgba(255,255,255,.4);font-family:'C1st Font',serif;
  font-size:10px;letter-spacing:.35em;text-transform:uppercase;transition:all .25s}
.mic-intro-btn:hover{border-color:rgba(0,229,255,.5);color:rgba(0,229,255,.9)}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 36px;opacity:0;transition:opacity 1s ease;pointer-events:none}
#nav.show{opacity:1;pointer-events:all}
.nav-back{font-family:'C1st Font',serif;font-size:9px;letter-spacing:.35em;
  text-transform:uppercase;color:rgba(0,229,255,.5);text-decoration:none;transition:color .2s}
.nav-back:hover{color:rgba(0,229,255,1)}
.nav-title{font-family:'C1st Font',serif;font-size:11px;letter-spacing:.15em;
  color:rgba(255,255,255,.3);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PLAYER BAR ── */
#player-bar{position:fixed;bottom:0;left:0;right:0;z-index:30;
  padding:0 36px 36px;opacity:0;transition:opacity 1s ease;pointer-events:none;
  display:flex;flex-direction:column;gap:12px;align-items:center}
#player-bar.show{opacity:1;pointer-events:all}

/* track info */
.track-info{text-align:center}
.track-name{font-family:'C1st Font',serif;font-size:12px;letter-spacing:.15em;
  color:rgba(255,255,255,.7);margin-bottom:3px}
.track-time{font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.25)}

/* progress */
.progress-wrap{width:min(520px,90vw);display:flex;align-items:center;gap:12px}
.prog-bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;
  position:relative;cursor:pointer}
.prog-fill{height:100%;background:linear-gradient(90deg,rgba(0,229,255,.8),rgba(139,92,246,.8));
  border-radius:2px;width:0%;transition:width .3s linear;pointer-events:none}
.time-label{font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.25);min-width:32px}

/* controls */
.controls{display:flex;align-items:center;gap:20px}
.ctrl-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .2s;backdrop-filter:blur(4px)}
.ctrl-btn:hover{border-color:rgba(0,229,255,.5);background:rgba(0,229,255,.07)}
.ctrl-btn.play-pause{width:54px;height:54px;font-size:18px;
  border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.05)}
.ctrl-btn.play-pause:hover{border-color:rgba(0,229,255,.8);background:rgba(0,229,255,.12);
  box-shadow:0 0 30px rgba(0,229,255,.2)}
.ctrl-btn.active{border-color:rgba(0,229,255,.6);background:rgba(0,229,255,.1)}

/* load new */
.load-new-btn{font-family:'C1st Font',serif;font-size:8px;letter-spacing:.35em;
  text-transform:uppercase;color:rgba(255,255,255,.2);border:none;
  background:transparent;padding:4px 10px;transition:color .2s}
.load-new-btn:hover{color:rgba(0,229,255,.8)}

/* visualizer bars */
.vis-bars{display:flex;gap:2px;align-items:flex-end;height:32px}
.f-bar{width:3px;min-height:2px;border-radius:1px 1px 0 0;
  background:rgba(0,229,255,.4)}

/* ── CURSOR ── */
a,button{cursor:none}
#cursor-dot{position:fixed;z-index:9999;pointer-events:none;width:8px;height:8px;
  border-radius:50%;background:rgba(0,229,255,.9);
  box-shadow:0 0 8px rgba(0,229,255,.9),0 0 20px rgba(0,229,255,.4);
  transform:translate(-50%,-50%);transition:width .15s,height .15s}
#cursor-ring{position:fixed;z-index:9998;pointer-events:none;width:32px;height:32px;
  border-radius:50%;border:1px solid rgba(0,229,255,.35);transform:translate(-50%,-50%)}
body.ch #cursor-dot{width:12px;height:12px;
  box-shadow:0 0 16px rgba(0,229,255,1),0 0 40px rgba(0,229,255,.6)}
body.ch #cursor-ring{width:50px;height:50px;border-color:rgba(0,229,255,.6)}
</style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<canvas id="universe"></canvas>
<audio id="audio" preload="auto"></audio>

<!-- INTRO -->
<div id="intro">
  <div class="intro-brand">LuZiD LaYeRs</div>
  <div class="intro-sub">Web Player</div>
  <div class="load-zone">
    <div class="load-prompt">Lade deine Musik</div>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">♫</div>
      <div class="drop-text">Datei ablegen</div>
      <div class="drop-sub">oder klicken zum Laden</div>
    </div>
    <input type="file" id="file-input" accept="audio/*">
    <div class="or-line">oder</div>
    <button class="mic-intro-btn" onclick="startWithMic()">Mikrofon verwenden</button>
  </div>
</div>

<!-- NAV -->
<nav id="nav">
  <a class="nav-back" href="home.html">← Universum</a>
  <div class="nav-title" id="nav-title">LuZiD LaYeRs Web Player</div>
</nav>

<!-- PLAYER BAR -->
<div id="player-bar">
  <div class="vis-bars" id="vis-bars"></div>
  <div class="track-info">
    <div class="track-name" id="track-name">—</div>
    <div class="track-time" id="track-time">0:00 / 0:00</div>
  </div>
  <div class="progress-wrap">
    <span class="time-label" id="t-cur">0:00</span>
    <div class="prog-bar" id="prog-bar">
      <div class="prog-fill" id="prog-fill"></div>
    </div>
    <span class="time-label" id="t-dur">0:00</span>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()" title="Mikrofon">🎙</button>
    <button class="ctrl-btn play-pause" id="pp-btn" onclick="togglePlay()" title="Play/Pause">▶</button>
    <button class="load-new-btn" onclick="document.getElementById('file-input').click()">+ Datei</button>
  </div>
</div>

<script>
const canvas=document.getElementById('universe'),ctx=canvas.getContext('2d');
const audio=document.getElementById('audio');
let W,H,stars=[],frame=0;
let analyser=null,freqData=null,waveData=null;
let bass=0,mid=0,treble=0,vol=0;
let micStream=null,micActive=false;
let actx=null;

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;initStars();}
addEventListener('resize',resize);

// ── STARS ──────────────────────────────────────────────────────────────────
class Star{
  constructor(){this.init()}
  init(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.z=Math.random();this.baseR=.3+this.z*1.5;
    this.vx=(Math.random()-.5)*.09*(0.3+this.z*.7);
    this.vy=(Math.random()-.5)*.09*(0.3+this.z*.7);
    this.phase=Math.random()*Math.PI*2;
    this.band=Math.floor(Math.random()*16);
    this.isHot=Math.random()<.04;this.brt=0;
  }
  update(){
    const b=freqData?getBand(this.band,freqData,16):0;
    this.brt=.2+b*.8;
    const push=bass*.6,dx=this.x-W*.5,dy=this.y-H*.5,dist=Math.sqrt(dx*dx+dy*dy)||1;
    this.vx+=(dx/dist)*push*.003;this.vy+=(dy/dist)*push*.003;
    this.vx*=.995;this.vy*=.995;
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<-10)this.x=W+10;if(this.x>W+10)this.x=-10;
    if(this.y<-10)this.y=H+10;if(this.y>H+10)this.y=-10;
  }
  draw(){
    const tw=.6+.4*Math.sin(frame*.03+this.phase);
    const r=this.baseR*(1+bass*2)*tw,a=(.3+this.brt*.7)*tw;
    const col=this.z>.7?lerpColor([0,229,255],[139,92,246],(vol+bass)*.5):[255,255,255];
    ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${a})`;ctx.fill();
    if(this.isHot||(this.brt>.75&&this.z>.6)){
      const gr=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*8);
      gr.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${a*.35})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(this.x,this.y,r*8,0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
    }
  }
}
function initStars(){stars=Array.from({length:Math.min(420,Math.floor(W*H/4800))},()=>new Star());}

// ── VISUALS ─────────────────────────────────────────────────────────────────
function drawNebulae(){
  const t=frame*.0004;
  [{cx:W*.5+Math.sin(t)*W*.2,cy:H*.45+Math.cos(t*.7)*H*.13,r:Math.min(W,H)*(.4+bass*.18),ca:[0,229,255],a:.05+mid*.08},
   {cx:W*.7+Math.cos(t*.6)*W*.14,cy:H*.55+Math.sin(t*.9)*H*.1,r:Math.min(W,H)*(.3+mid*.1),ca:[139,92,246],a:.04+bass*.07},
   {cx:W*.25+Math.sin(t*.8)*W*.1,cy:H*.3+Math.cos(t*1.1)*H*.09,r:Math.min(W,H)*(.22+treble*.08),ca:[80,200,255],a:.03+vol*.05}
  ].forEach(b=>{
    const gr=ctx.createRadialGradient(b.cx,b.cy,0,b.cx,b.cy,b.r);
    gr.addColorStop(0,`rgba(${b.ca[0]},${b.ca[1]},${b.ca[2]},${b.a})`);
    gr.addColorStop(.5,`rgba(${b.ca[0]},${b.ca[1]},${b.ca[2]},${b.a*.3})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  });
}
function drawCore(){
  const r=80+bass*280+vol*120;
  const gr=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
  gr.addColorStop(0,`rgba(0,229,255,${.08+bass*.3})`);
  gr.addColorStop(.3,`rgba(0,229,255,${.03+bass*.1})`);
  gr.addColorStop(.7,`rgba(139,92,246,${.02+mid*.05})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
}
function drawConnections(){
  const maxDist=90+vol*80,near=stars.filter(s=>s.z>.5);
  for(let i=0;i<near.length;i++) for(let j=i+1;j<near.length;j++){
    const dx=near[i].x-near[j].x,dy=near[i].y-near[j].y,d2=dx*dx+dy*dy;
    if(d2<maxDist*maxDist){
      const f=1-Math.sqrt(d2)/maxDist;
      ctx.beginPath();ctx.moveTo(near[i].x,near[i].y);ctx.lineTo(near[j].x,near[j].y);
      ctx.strokeStyle=`rgba(0,229,255,${f*.15*(1+vol*2)})`;ctx.lineWidth=.4+f*.7;ctx.stroke();
    }
  }
}
function drawWaveRing(){
  if(!waveData||!analyser)return;
  analyser.getByteTimeDomainData(waveData);
  const cx=W/2,cy=H/2,baseR=Math.min(W,H)*.22;
  ctx.beginPath();
  for(let i=0;i<waveData.length;i++){
    const angle=(i/waveData.length)*Math.PI*2-Math.PI/2;
    const v=waveData[i]/128-1,r=baseR+v*baseR*.8*(1+vol*1.5);
    const x=cx+Math.cos(angle)*r,y=cy+Math.sin(angle)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.strokeStyle=`rgba(0,229,255,${.1+vol*.3})`;ctx.lineWidth=1.2;ctx.stroke();
}
function drawFreqRing(){
  if(!freqData||!analyser)return;
  analyser.getByteFrequencyData(freqData);
  const cx=W/2,cy=H/2,n=64,baseR=Math.min(W,H)*.28;
  for(let i=0;i<n;i++){
    const idx=Math.floor((i/n)*freqData.length*.6);
    const v=freqData[idx]/255;
    const angle=(i/n)*Math.PI*2-Math.PI/2;
    const r1=baseR,r2=baseR+v*Math.min(W,H)*.12;
    const col=lerpColor([0,229,255],[139,92,246],v);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(angle)*r1,cy+Math.sin(angle)*r1);
    ctx.lineTo(cx+Math.cos(angle)*r2,cy+Math.sin(angle)*r2);
    ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${.5+v*.5})`;
    ctx.lineWidth=2+v*2;ctx.stroke();
  }
}
function updateVisBars(){
  if(!freqData)return;
  document.querySelectorAll('.f-bar').forEach((bar,i)=>{
    const idx=Math.floor((i/20)*freqData.length*.6),v=freqData[idx]/255;
    bar.style.height=(2+v*28)+'px';
    const c=lerpColor([0,229,255],[139,92,246],v);
    bar.style.background=`rgba(${c[0]},${c[1]},${c[2]},${.4+v*.6})`;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  requestAnimationFrame(render);frame++;
  if(analyser&&freqData){
    analyser.getByteFrequencyData(freqData);
    const len=freqData.length,bEnd=Math.floor(len*.08),mEnd=Math.floor(len*.45);
    let bS=0,mS=0,tS=0;
    for(let i=0;i<bEnd;i++)bS+=freqData[i];
    for(let i=bEnd;i<mEnd;i++)mS+=freqData[i];
    for(let i=mEnd;i<len;i++)tS+=freqData[i];
    bass  =smooth(bass,  bS/bEnd/255,.15);
    mid   =smooth(mid,   mS/(mEnd-bEnd)/255,.15);
    treble=smooth(treble,tS/(len-mEnd)/255,.15);
    vol   =bass*.5+mid*.3+treble*.2;
    updateVisBars();
  } else {
    bass=.04+Math.sin(frame*.018)*.03;
    mid =.03+Math.cos(frame*.025)*.02;
    treble=.02;vol=.035;
  }
  ctx.fillStyle=`rgba(0,0,0,${.15+bass*.1})`;ctx.fillRect(0,0,W,H);
  drawNebulae();drawCore();drawConnections();drawFreqRing();drawWaveRing();
  for(const s of stars){s.update();s.draw();}
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getBand(band,arr,total){
  const sz=Math.floor(arr.length/total);let s=0;
  for(let i=band*sz;i<(band+1)*sz&&i<arr.length;i++)s+=arr[i];
  return s/(sz*255);
}
function smooth(o,v,f){return o+(v-o)*f}
function lerpColor(a,b,t){
  t=Math.max(0,Math.min(1,t));
  return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];
}
function fmtTime(s){const m=Math.floor(s/60);return m+':'+(Math.floor(s%60)+'').padStart(2,'0')}

// ── AUDIO CONTEXT ─────────────────────────────────────────────────────────────
function ensureACtx(){
  if(!actx){
    actx=new(window.AudioContext||window.webkitAudioContext)();
  } else if(actx.state==='suspended'){
    actx.resume();
  }
}
function connectAnalyser(src){
  if(!actx)ensureACtx();
  analyser=actx.createAnalyser();
  analyser.fftSize=2048;
  analyser.smoothingTimeConstant=.82;
  src.connect(analyser);
  analyser.connect(actx.destination);
  freqData=new Uint8Array(analyser.frequencyBinCount);
  waveData=new Uint8Array(analyser.fftSize);
}

// ── FILE LOADING ──────────────────────────────────────────────────────────────
let audioSrc=null;
function loadAudioFile(file){
  if(!file||!file.type.startsWith('audio/'))return;
  stopMic();
  if(audioSrc){audioSrc.disconnect();audioSrc=null;}
  if(analyser){analyser.disconnect();analyser=null;}
  const url=URL.createObjectURL(file);
  audio.src=url;
  audio.load();
  const name=file.name.replace(/\.[^/.]+$/,'');
  document.getElementById('track-name').textContent=name;
  document.getElementById('nav-title').textContent=name;
  showPlayer();
  ensureACtx();
  if(!audioSrc){
    audioSrc=actx.createMediaElementSource(audio);
    connectAnalyser(audioSrc);
  }
  audio.play();
  document.getElementById('pp-btn').textContent='⏸';
}

// ── PLAY/PAUSE ────────────────────────────────────────────────────────────────
function togglePlay(){
  if(!audio.src&&!micActive)return;
  ensureACtx();
  if(audio.src){
    if(audio.paused){audio.play();document.getElementById('pp-btn').textContent='⏸';}
    else{audio.pause();document.getElementById('pp-btn').textContent='▶';}
  }
}

// ── PROGRESS ─────────────────────────────────────────────────────────────────
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('t-cur').textContent=fmtTime(audio.currentTime);
  document.getElementById('t-dur').textContent=fmtTime(audio.duration);
  document.getElementById('track-time').textContent=fmtTime(audio.currentTime)+' / '+fmtTime(audio.duration);
});
document.getElementById('prog-bar').addEventListener('click',e=>{
  if(!audio.duration)return;
  const rect=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
});

// ── MIC ───────────────────────────────────────────────────────────────────────
async function startWithMic(){
  showPlayer();
  await startMic();
}
async function startMic(){
  if(!navigator.mediaDevices?.getUserMedia)return;
  try{
    if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
    if(audioSrc){audioSrc.disconnect();audioSrc=null;}
    if(analyser){analyser.disconnect();analyser=null;}
    ensureACtx();
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const micSrc=actx.createMediaStreamSource(micStream);
    connectAnalyser(micSrc);
    micSrc.disconnect(analyser);micSrc.connect(analyser);
    micActive=true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent='🔴';
  }catch(e){console.warn('mic:',e);}
}
function stopMic(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  micActive=false;
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-btn').textContent='🎙';
}
async function toggleMic(){
  if(micActive){stopMic();if(audio.src&&audio.paused)audio.play();}
  else{await startMic();}
}

// ── SHOW PLAYER ───────────────────────────────────────────────────────────────
function showPlayer(){
  document.getElementById('intro').classList.add('out');
  setTimeout(()=>{
    document.getElementById('nav').classList.add('show');
    document.getElementById('player-bar').classList.add('show');
  },600);
}

// ── FILE INPUT + DRAG ─────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change',e=>{
  if(e.target.files[0])loadAudioFile(e.target.files[0]);
});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('drag');
  const f=e.dataTransfer.files[0];if(f)loadAudioFile(f);
});
// also allow dropping anywhere on the page
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('audio/'))loadAudioFile(f);
});

// ── VIS BARS INIT ─────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('vis-bars');
  for(let i=0;i<20;i++){const b=document.createElement('div');b.className='f-bar';b.style.height='2px';c.appendChild(b);}
})();

resize();render();
</script>
<script>
const _cd=document.getElementById('cursor-dot'),_cr=document.getElementById('cursor-ring');
let _mx=0,_my=0,_rx=0,_ry=0;
document.addEventListener('mousemove',e=>{_mx=e.clientX;_my=e.clientY;_cd.style.left=_mx+'px';_cd.style.top=_my+'px';});
(function _rl(){_rx+=(_mx-_rx)*.12;_ry+=(_my-_ry)*.12;_cr.style.left=_rx+'px';_cr.style.top=_ry+'px';requestAnimationFrame(_rl);})();
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});
</script>
</body>
</html>
