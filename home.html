<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuZiD LaYeRs</title>
<link rel="stylesheet" href="fonts.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
body { font-family: 'C1st Font', serif; color: #fff; }

/* ── CUSTOM CURSOR ── */
#cursor-dot {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(0,229,255,0.9);
  box-shadow: 0 0 8px rgba(0,229,255,0.9), 0 0 20px rgba(0,229,255,0.4);
  transform: translate(-50%,-50%);
  transition: width .15s, height .15s, background .2s, box-shadow .2s;
}
#cursor-ring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.35);
  transform: translate(-50%,-50%);
  transition: width .25s, height .25s, border-color .2s, opacity .2s;
}
body.cursor-hover #cursor-dot {
  width: 12px; height: 12px;
  background: rgba(0,229,255,1);
  box-shadow: 0 0 16px rgba(0,229,255,1), 0 0 40px rgba(0,229,255,0.6), 0 0 80px rgba(139,92,246,0.3);
}
body.cursor-hover #cursor-ring {
  width: 50px; height: 50px;
  border-color: rgba(0,229,255,0.6);
}

canvas#universe { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

/* ── INTRO ── */
#intro {
  position: fixed; inset: 0; z-index: 50;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 1.8s ease; pointer-events: all;
}
#intro.out { opacity: 0; pointer-events: none; }

.intro-brand {
  font-family: 'C1st Font', serif;
  font-size: clamp(38px, 7vw, 88px);
  letter-spacing: 0.18em; color: #fff;
  text-shadow: 0 0 30px rgba(0,229,255,0.5), 0 0 80px rgba(0,229,255,0.2);
  margin-bottom: 12px;
  animation: brand-breathe 4s ease-in-out infinite;
}
@keyframes brand-breathe {
  0%,100% { text-shadow: 0 0 30px rgba(0,229,255,0.4), 0 0 80px rgba(0,229,255,0.15); }
  50%      { text-shadow: 0 0 50px rgba(0,229,255,0.9), 0 0 120px rgba(139,92,246,0.35); }
}
.intro-role {
  font-size: clamp(9px,1.3vw,13px); letter-spacing: 0.55em;
  color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 72px;
}
.intro-line {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, transparent, rgba(0,229,255,0.4));
  margin-bottom: 32px;
}
.intro-prompt {
  font-family: 'C1st Font', serif; font-size: clamp(13px,2vw,18px);
  letter-spacing: 0.35em; color: rgba(255,255,255,0.6); text-transform: uppercase;
  margin-bottom: 48px; animation: prompt-pulse 2.5s ease-in-out infinite;
}
@keyframes prompt-pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

.enter-ring { position: relative; width: 90px; height: 90px; cursor: pointer; }
.enter-ring::before, .enter-ring::after {
  content: ''; position: absolute; border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.25);
  animation: ring-expand 2.8s ease-out infinite;
}
.enter-ring::before { inset: -14px; animation-delay: 0s; }
.enter-ring::after  { inset: -28px; animation-delay: 0.7s; }
@keyframes ring-expand {
  0%  { transform: scale(0.9); opacity: 0.8; }
  100%{ transform: scale(1.15); opacity: 0; }
}
.enter-circle {
  width: 90px; height: 90px; border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.5); background: rgba(0,229,255,0.04);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.35s; backdrop-filter: blur(4px);
}
.enter-ring:hover .enter-circle {
  background: rgba(0,229,255,0.12); border-color: rgba(0,229,255,0.9);
  box-shadow: 0 0 40px rgba(0,229,255,0.35), inset 0 0 20px rgba(0,229,255,0.08);
}
.play-tri {
  width: 0; height: 0; border-style: solid;
  border-width: 13px 0 13px 24px;
  border-color: transparent transparent transparent rgba(0,229,255,0.85);
  margin-left: 5px;
}

/* ── NAV ── */
#nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 36px;
  opacity: 0; transition: opacity 1.2s ease 0.6s; pointer-events: none;
}
#nav.show { opacity: 1; pointer-events: all; }
.nav-logo {
  font-family: 'C1st Font', serif; font-size: 17px; letter-spacing: 0.17em;
  color: rgba(255,255,255,0.85); text-decoration: none;
  text-shadow: 0 0 20px rgba(0,229,255,0.3);
  transition: text-shadow .3s;
}
.nav-logo:hover {
  text-shadow: 0 0 8px #fff, 0 0 28px rgba(0,229,255,.9), 0 0 60px rgba(0,229,255,.4);
}
.nav-hint {
  font-size: 9px; letter-spacing: 0.45em; text-transform: uppercase;
  color: rgba(255,255,255,0.18);
}

/* ── DESTINATION STARS ── */
#star-nav {
  position: fixed; inset: 0; z-index: 20;
  pointer-events: none; opacity: 0;
  transition: opacity 1.4s ease 1s;
}
#star-nav.show { opacity: 1; pointer-events: all; }

.dest {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  text-decoration: none; color: inherit;
}

/* The glowing dot */
.dest-dot {
  position: relative;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--dc);
  box-shadow: 0 0 12px var(--dc), 0 0 30px color-mix(in srgb, var(--dc) 40%, transparent);
  animation: dest-pulse 3s ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  transition: transform 0.3s, box-shadow 0.3s;
}
@keyframes dest-pulse {
  0%,100% { transform: scale(1);   opacity: 0.7; }
  50%      { transform: scale(1.5); opacity: 1;   }
}
.dest:hover .dest-dot {
  transform: scale(2.2);
  box-shadow: 0 0 20px var(--dc), 0 0 60px color-mix(in srgb, var(--dc) 60%, transparent);
}

/* Outer ring */
.dest-dot::before {
  content: '';
  position: absolute; inset: -12px; border-radius: 50%;
  border: 1px solid color-mix(in srgb, var(--dc) 30%, transparent);
  animation: dest-ring 3s ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes dest-ring {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50%      { transform: scale(1.8); opacity: 0; }
}

/* Label */
.dest-label {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  opacity: 0.5; transition: opacity 0.3s;
}
.dest:hover .dest-label { opacity: 1; }
.dest-name {
  font-family: 'C1st Font', serif;
  font-size: clamp(11px, 1.4vw, 15px);
  letter-spacing: 0.25em; text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 20px var(--dc);
  transition: text-shadow .3s, letter-spacing .3s;
}
.dest:hover .dest-name {
  text-shadow: 0 0 10px #fff, 0 0 30px var(--dc), 0 0 60px var(--dc);
  letter-spacing: 0.32em;
}
.dest-sub {
  font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  transition: color .3s;
}
.dest:hover .dest-sub { color: rgba(255,255,255,0.7); }

/* ── BOTTOM HUD ── */
#hud {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: 28px; gap: 12px;
  opacity: 0; transition: opacity 1.2s ease 0.8s; pointer-events: none;
}
#hud.show { opacity: 1; }
#freq-bars { display: flex; gap: 2px; align-items: flex-end; height: 38px; }
.f-bar {
  width: 3px; min-height: 2px; border-radius: 2px 2px 0 0;
  background: rgba(0,229,255,0.5); transition: height 0.04s ease, background 0.04s;
}
.hud-status {
  font-family: 'C1st Font', serif; font-size: 9px;
  letter-spacing: 0.5em; text-transform: uppercase; color: rgba(255,255,255,0.18);
}
</style>
</head>
<body>

<canvas id="universe"></canvas>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-brand">LuZiD LaYeRs</div>
  <div class="intro-role">Visual Artist · Creative Technologist · VJ</div>
  <div class="intro-line"></div>
  <div class="intro-prompt">Betritt das Universum</div>
  <div class="enter-ring" onclick="startExperience()" role="button" aria-label="Enter">
    <div class="enter-circle"><div class="play-tri"></div></div>
  </div>
</div>

<!-- NAV -->
<nav id="nav">
  <a class="nav-logo" href="home.html">LuZiD LaYeRs</a>
  <span class="nav-hint">Wähle einen Stern</span>
</nav>

<!-- DESTINATION STARS -->
<div id="star-nav">

  <!-- FusionWarp — upper right -->
  <a class="dest" href="fusionwarp.html"
     style="top:32%; left:72%; --dc:#39FF7A; --delay:0s;">
    <div class="dest-dot"></div>
    <div class="dest-label">
      <span class="dest-name">FuSioNWaRp</span>
      <span class="dest-sub">Visual Engine</span>
    </div>
  </a>

  <!-- Web Player — left -->
  <a class="dest" href="player.html"
     style="top:50%; left:20%; --dc:#00E5FF; --delay:0.6s;">
    <div class="dest-dot"></div>
    <div class="dest-label">
      <span class="dest-name">Web Player</span>
      <span class="dest-sub">Musik visualisieren</span>
    </div>
  </a>

  <!-- Shop — right -->
  <a class="dest" href="shop.html"
     style="top:65%; left:74%; --dc:#8B5CF6; --delay:1.2s;">
    <div class="dest-dot"></div>
    <div class="dest-label">
      <span class="dest-name">Shop</span>
      <span class="dest-sub">Art Prints · Screensaver</span>
    </div>
  </a>

  <!-- Future — upper left -->
  <a class="dest" href="future.html"
     style="top:28%; left:26%; --dc:#FF9500; --delay:0.3s;">
    <div class="dest-dot"></div>
    <div class="dest-label">
      <span class="dest-name">Coming Soon</span>
      <span class="dest-sub">krom-A · Hardware · Remote</span>
    </div>
  </a>

  <!-- Artist — lower center -->
  <a class="dest" href="artist.html"
     style="top:72%; left:42%; --dc:#FFD700; --delay:0.9s;">
    <div class="dest-dot"></div>
    <div class="dest-label">
      <span class="dest-name">Artist</span>
      <span class="dest-sub">Andreas Deflorin</span>
    </div>
  </a>

  <!-- Generator — lower left -->
  <a class="dest" href="generator.html"
     style="top:62%; left:15%; --dc:#FF3CAC; --delay:1.5s;">
    <div class="dest-dot"></div>
    <div class="dest-label">
      <span class="dest-name">Generator</span>
      <span class="dest-sub">Wallpaper · Screensaver</span>
    </div>
  </a>

</div>

<!-- BOTTOM HUD -->
<div id="hud">
  <div id="freq-bars"></div>
  <div class="hud-status" id="hud-status">Bereit</div>
</div>

<script>
const canvas = document.getElementById('universe');
const ctx = canvas.getContext('2d');
let W, H, stars = [], frame = 0;
let analyser = null, freqData = null, waveData = null;
let bass = 0, mid = 0, treble = 0, vol = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initStars();
}
window.addEventListener('resize', resize);

class Star {
  constructor() { this.init(); }
  init() {
    this.x = Math.random() * W; this.y = Math.random() * H;
    this.z = Math.random();
    this.baseR = 0.3 + this.z * 1.5;
    this.vx = (Math.random()-0.5)*0.09*(0.3+this.z*0.7);
    this.vy = (Math.random()-0.5)*0.09*(0.3+this.z*0.7);
    this.phase = Math.random()*Math.PI*2;
    this.band = Math.floor(Math.random()*16);
    this.brt = 0; this.isHot = Math.random()<0.04;
  }
  update() {
    const bFreq = freqData ? getBand(this.band, freqData, 16) : 0;
    this.brt = 0.2 + bFreq * 0.8;
    const push = bass*0.4, dx=this.x-W*.5, dy=this.y-H*.5;
    const dist = Math.sqrt(dx*dx+dy*dy)||1;
    this.vx += (dx/dist)*push*0.002; this.vy += (dy/dist)*push*0.002;
    this.vx *= 0.995; this.vy *= 0.995;
    this.x += this.vx; this.y += this.vy;
    if(this.x<-10) this.x=W+10; if(this.x>W+10) this.x=-10;
    if(this.y<-10) this.y=H+10; if(this.y>H+10) this.y=-10;
  }
  draw() {
    const tw=0.6+0.4*Math.sin(frame*0.03+this.phase);
    const r=this.baseR*(1+bass*1.2)*tw, a=(0.3+this.brt*0.7)*tw;
    let col = this.z>0.7 ? lerpColor([0,229,255],[139,92,246],(vol+bass)*.5) : [255,255,255];
    ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${a})`; ctx.fill();
    if(this.isHot||(this.brt>0.7&&this.z>0.6)) {
      const gr=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*6);
      gr.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${a*0.3})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(this.x,this.y,r*6,0,Math.PI*2);
      ctx.fillStyle=gr; ctx.fill();
    }
  }
}

function initStars() {
  stars = Array.from({length:Math.min(380,Math.floor(W*H/5200))}, ()=>new Star());
}

function drawNebulae() {
  const t=frame*0.0004;
  const blobs=[
    {cx:W*.5+Math.sin(t)*W*.18,  cy:H*.4+Math.cos(t*.7)*H*.12, r:Math.min(W,H)*(.38+bass*.12), ca:[0,229,255],  a:.04+mid*.06},
    {cx:W*.65+Math.cos(t*.6)*W*.12,cy:H*.6+Math.sin(t*.9)*H*.1,  r:Math.min(W,H)*(.28+mid*.08),  ca:[139,92,246], a:.03+bass*.05},
    {cx:W*.3+Math.sin(t*.8)*W*.1,  cy:H*.35+Math.cos(t*1.1)*H*.08,r:Math.min(W,H)*(.22+treble*.06),ca:[80,200,255],a:.025+vol*.04},
  ];
  for(const b of blobs){
    const gr=ctx.createRadialGradient(b.cx,b.cy,0,b.cx,b.cy,b.r);
    gr.addColorStop(0,`rgba(${b.ca[0]},${b.ca[1]},${b.ca[2]},${b.a})`);
    gr.addColorStop(.5,`rgba(${b.ca[0]},${b.ca[1]},${b.ca[2]},${b.a*.3})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  }
}

function drawCore() {
  const r=60+bass*200+vol*80;
  const gr=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
  gr.addColorStop(0,`rgba(0,229,255,${.06+bass*.24})`);
  gr.addColorStop(.3,`rgba(0,229,255,${.02+bass*.08})`);
  gr.addColorStop(.7,`rgba(139,92,246,${.015+mid*.04})`);
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
}

function drawConnections() {
  const maxDist=80+vol*60, nearby=stars.filter(s=>s.z>0.5);
  for(let i=0;i<nearby.length;i++) for(let j=i+1;j<nearby.length;j++){
    const dx=nearby[i].x-nearby[j].x, dy=nearby[i].y-nearby[j].y;
    const d2=dx*dx+dy*dy;
    if(d2<maxDist*maxDist){
      const f=1-Math.sqrt(d2)/maxDist;
      ctx.beginPath(); ctx.moveTo(nearby[i].x,nearby[i].y); ctx.lineTo(nearby[j].x,nearby[j].y);
      ctx.strokeStyle=`rgba(0,229,255,${f*.12*(1+vol*1.5)})`; ctx.lineWidth=0.4+f*.6; ctx.stroke();
    }
  }
}

function drawWaveRing() {
  if(!waveData||!analyser) return;
  analyser.getByteTimeDomainData(waveData);
  const cx=W/2, cy=H/2, baseR=Math.min(W,H)*.18;
  ctx.beginPath();
  for(let i=0;i<waveData.length;i++){
    const angle=(i/waveData.length)*Math.PI*2-Math.PI/2;
    const v=waveData[i]/128-1, r=baseR+v*baseR*.6*(1+vol);
    const x=cx+Math.cos(angle)*r, y=cy+Math.sin(angle)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.strokeStyle=`rgba(0,229,255,${.08+vol*.2})`; ctx.lineWidth=1; ctx.stroke();
}

function updateHUD() {
  if(!freqData) return;
  document.querySelectorAll('.f-bar').forEach((bar,i)=>{
    const idx=Math.floor((i/28)*freqData.length*.6), v=freqData[idx]/255;
    bar.style.height=(2+v*36)+'px';
    const c=lerpColor([0,229,255],[139,92,246],v);
    bar.style.background=`rgba(${c[0]},${c[1]},${c[2]},${.4+v*.6})`;
  });
}

function render() {
  requestAnimationFrame(render); frame++;
  if(analyser&&freqData){
    analyser.getByteFrequencyData(freqData);
    const len=freqData.length, bEnd=Math.floor(len*.08), mEnd=Math.floor(len*.45);
    let bS=0,mS=0,tS=0;
    for(let i=0;i<bEnd;i++) bS+=freqData[i];
    for(let i=bEnd;i<mEnd;i++) mS+=freqData[i];
    for(let i=mEnd;i<len;i++) tS+=freqData[i];
    bass  =smooth(bass,  bS/bEnd/255,.15);
    mid   =smooth(mid,   mS/(mEnd-bEnd)/255,.15);
    treble=smooth(treble,tS/(len-mEnd)/255,.15);
    vol   =bass*.5+mid*.3+treble*.2;
    updateHUD();
  } else {
    bass=0.04+Math.sin(frame*.018)*.03; mid=0.03+Math.cos(frame*.025)*.02;
    treble=0.02; vol=0.035;
  }
  ctx.fillStyle=`rgba(0,0,0,${.18+bass*.08})`; ctx.fillRect(0,0,W,H);
  drawNebulae(); drawCore(); drawConnections(); drawWaveRing();
  for(const s of stars){s.update();s.draw();}
}

function getBand(band,arr,total){
  const sz=Math.floor(arr.length/total); let s=0;
  for(let i=band*sz;i<(band+1)*sz&&i<arr.length;i++) s+=arr[i];
  return s/(sz*255);
}
function smooth(o,v,f){return o+(v-o)*f;}
function lerpColor(a,b,t){
  t=Math.max(0,Math.min(1,t));
  return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];
}

function startExperience() {
  sessionStorage.setItem('ll_entered','1');
  document.getElementById('intro').classList.add('out');
  setTimeout(()=>{
    document.getElementById('nav').classList.add('show');
    document.getElementById('star-nav').classList.add('show');
    document.getElementById('hud').classList.add('show');
  },900);
}

(function(){
  const c=document.getElementById('freq-bars');
  for(let i=0;i<28;i++){const b=document.createElement('div');b.className='f-bar';b.style.height='2px';c.appendChild(b);}
})();

resize(); render();

// ── SKIP INTRO wenn zurück von Unterseite ────────────────────────────────
if(sessionStorage.getItem('ll_entered')){
  document.getElementById('intro').style.display='none';
  document.getElementById('nav').classList.add('show');
  document.getElementById('star-nav').classList.add('show');
  document.getElementById('hud').classList.add('show');
}

// ── CUSTOM CURSOR ─────────────────────────────────────────────────────────
const dot  = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let mx=0, my=0, rx=0, ry=0;

document.addEventListener('mousemove', e=>{
  mx=e.clientX; my=e.clientY;
  dot.style.left=mx+'px'; dot.style.top=my+'px';
});

// Ring follows with slight lag
(function ringLoop(){
  rx += (mx-rx)*.12;
  ry += (my-ry)*.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(ringLoop);
})();

// Hover state on clickable elements
document.querySelectorAll('a, button, .dest, .enter-ring, [onclick]').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-hover'));
});
</script>
</body>
</html>
